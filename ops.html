<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StadiumFlow | Ops Command</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #8b5cf6;
            --accent: #10b981;
            --danger: #ef4444;
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.8);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0f172a, #030712);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .navbar {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            height: fit-content;
        }

        h2 {
            margin-top: 0;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
        }

        th {
            text-align: left;
            padding: 0.75rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-bottom: 1px solid var(--glass-border);
        }

        td {
            padding: 1rem 0.75rem;
            border-bottom: 1px solid var(--glass-border);
            font-size: 0.9rem;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-badge.override {
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        input, select {
            width: 100%;
            padding: 0.875rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            margin-bottom: 1rem;
        }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover { background: #2563eb; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .broadcast-btn { background: var(--secondary); }
        .broadcast-btn:hover { background: #7c3aed; }

        #wait-status, #broadcast-status {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 10px;
            font-size: 0.85rem;
            display: none;
        }

        .success { background: rgba(16, 185, 129, 0.1); color: var(--accent); border: 1px solid rgba(16, 185, 129, 0.2); }
        .error { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>

    <nav class="navbar">
        <h1><i data-lucide="radio"></i> StadiumFlow Ops</h1>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <a href="/" style="color: var(--text-muted); text-decoration: none; font-size: 0.85rem; font-weight: 600; padding: 0.5rem 1rem; border: 1px solid var(--glass-border); border-radius: 100px; transition: all 0.2s; display: flex; align-items: center; gap: 0.25rem;">
                <i data-lucide="arrow-left" style="width:14px;height:14px"></i>
                Attendee Hub
            </a>
            <div class="status-badge">System Live</div>
        </div>
    </nav>

    <div class="container">
        <!-- Dashboard Section -->
        <div class="panel">
            <h2><i data-lucide="activity"></i> Unit Availability</h2>
            <table>
                <thead>
                    <tr>
                        <th>POI ID</th>
                        <th>Type</th>
                        <th>Live Wait</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>R-101</td>
                        <td>Restroom</td>
                        <td><span id="status-R-101" class="status-badge">14m</span></td>
                    </tr>
                    <tr>
                        <td>C-205</td>
                        <td>Concession</td>
                        <td><span id="status-C-205" class="status-badge">4m</span></td>
                    </tr>
                </tbody>
            </table>

            <hr style="border:0; border-top: 1px solid var(--glass-border); margin: 2rem 0">

            <h2><i data-lucide="edit-3"></i> Manual Override</h2>
            <label>Select Target POI</label>
            <select id="poi-select">
                <option value="R-101">R-101 (Restroom)</option>
                <option value="C-205">C-205 (Concession)</option>
            </select>

            <label>Verified Wait (Minutes)</label>
            <input type="number" id="wait-input" placeholder="Enter minutes">

            <button id="update-wait-btn"><i data-lucide="save"></i> Update System</button>
            <div id="wait-status"></div>
        </div>

        <!-- Communications Section -->
        <div class="panel">
            <h2><i data-lucide="megaphone"></i> Broadcast Center</h2>
            
            <label>Target Zone</label>
            <select id="zone-select">
                <option value="North Entrance">North Entrance</option>
                <option value="South Concourse">South Concourse</option>
                <option value="Section 105">Section 105</option>
            </select>

            <label>Classification</label>
            <select id="broadcast-type">
                <option value="info">Information</option>
                <option value="alert">Alert</option>
                <option value="emergency">Emergency</option>
            </select>

            <label>Headline</label>
            <input type="text" id="broadcast-name" placeholder="Headline...">

            <label>Message Content</label>
            <input type="text" id="broadcast-msg" placeholder="Details...">

            <button id="send-broadcast-btn" class="broadcast-btn"><i data-lucide="send"></i> Dispatch to Zone</button>
            <div id="broadcast-status"></div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const AUTH_HEADER = 'Bearer STUB_STAFF_TOKEN';

        const showStatus = (el, msg, type) => {
            el.textContent = msg;
            el.className = type;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        };

        document.getElementById('update-wait-btn').addEventListener('click', async () => {
            const btn = document.getElementById('update-wait-btn');
            const poiId = document.getElementById('poi-select').value;
            const waitTime = parseInt(document.getElementById('wait-input').value, 10);
            const statusDiv = document.getElementById('wait-status');

            if (isNaN(waitTime)) return showStatus(statusDiv, "Enter a valid number", "error");

            btn.disabled = true;
            try {
                const baseUrl = window.location.origin;
                const res = await fetch(`${baseUrl}/api/signals`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': AUTH_HEADER },
                    body: JSON.stringify({ poiId, waitMinutes: waitTime, submitterRole: 'staff' })
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                document.getElementById(`status-${poiId}`).innerText = `${data.newAggregatedWaitMinutes}m (Override)`;
                document.getElementById(`status-${poiId}`).className = "status-badge override";
                showStatus(statusDiv, "Override applied successfully", "success");
            } catch (err) {
                showStatus(statusDiv, "Submission failed", "error");
            } finally { btn.disabled = false; }
        });

        document.getElementById('send-broadcast-btn').addEventListener('click', async () => {
            const btn = document.getElementById('send-broadcast-btn');
            const statusDiv = document.getElementById('broadcast-status');
            const payload = {
                zone: document.getElementById('zone-select').value,
                type: document.getElementById('broadcast-type').value,
                name: document.getElementById('broadcast-name').value.trim(),
                message: document.getElementById('broadcast-msg').value.trim()
            };

            if (!payload.name || !payload.message) return showStatus(statusDiv, "All fields required", "error");

            btn.disabled = true;
            try {
                const baseUrl = window.location.origin;
                const res = await fetch(`${baseUrl}/api/broadcasts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': AUTH_HEADER },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                showStatus(statusDiv, "Broadcast successfully dispatched", "success");
            } catch (err) {
                showStatus(statusDiv, `Dispatch failed: ${err.message}`, "error");
            } finally { btn.disabled = false; }
        });
    </script>
</body>
</html>

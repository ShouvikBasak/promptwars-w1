<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StadiumFlow | Attendee Hub</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --accent: #10b981;
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            outline-color: var(--primary);
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #030712);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 2rem 1rem;
            text-align: center;
            background: linear-gradient(to bottom, rgba(3, 7, 18, 0.8), transparent);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            margin: 0.5rem 0 0;
            color: var(--text-muted);
            font-weight: 300;
        }

        main {
            width: 100%;
            max-width: 500px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 {
            margin-top: 0;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        select {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            appearance: none;
            cursor: pointer;
            margin-bottom: 1.5rem;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .checkbox-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .checkbox-item input {
            width: 1.25rem;
            height: 1.25rem;
            accent-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 1.25rem;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border: none;
            border-radius: 16px;
            color: white;
            font-family: inherit;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 15px -3px var(--primary-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px var(--primary-glow);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        #results-area {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .rec-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            transition: transform 0.3s;
            animation: slideUp 0.5s ease-out forwards;
        }

        .rec-card:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.05);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .rec-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .poi-id {
            font-weight: 700;
            font-size: 1.125rem;
            color: var(--primary);
        }

        .badge-warning {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.75rem;
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 100px;
            text-transform: uppercase;
        }

        .rec-text {
            line-height: 1.6;
            color: var(--text);
            margin: 0;
        }

        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 1rem;
            color: #ef4444;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>StadiumFlow</h1>
        <p>Your AI-Powered Event Navigator</p>
    </header>

    <main>
        <section class="glass-panel" aria-labelledby="context-heading">
            <h2 id="context-heading">
                <i data-lucide="map-pin" style="color: var(--primary)"></i>
                Your Location
            </h2>
            
            <label for="zone-select">Select your current zone</label>
            <select id="zone-select">
                <option value="North Entrance">North Entrance</option>
                <option value="South Concourse">South Concourse</option>
                <option value="Section 105">Section 105</option>
                <option value="Main Stage">Main Stage</option>
            </select>

            <h2>
                <i data-lucide="accessibility" style="color: var(--accent)"></i>
                Preferences
            </h2>
            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" id="pref-wheelchair" value="wheelchair_accessible">
                    <span>Wheelchair Accessible</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="pref-family" value="family_restroom">
                    <span>Family Restroom</span>
                </label>
            </div>

            <button id="fetch-btn">
                <span id="btn-text">Optimize My Route</span>
                <i data-lucide="sparkles" id="btn-icon"></i>
            </button>
        </section>

        <section id="results-area" aria-live="polite">
            <!-- Results will appear here -->
        </section>
    </main>

    <footer>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 1.5rem; width: 100%; max-width: 500px;">
            <!-- Prominent Staff Portal Button -->
            <a href="/ops" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.75rem; background: rgba(255, 255, 255, 0.05); color: white; text-decoration: none; padding: 1rem; border-radius: 16px; font-weight: 700; font-size: 0.95rem; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); transition: all 0.3s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">
                <i data-lucide="shield-alert" style="width:18px;height:18px;color: #fbbf24;"></i>
                Enter Ops Command Center
                <i data-lucide="arrow-right" style="width:16px;height:16px;opacity: 0.5;"></i>
            </a>

            <div style="display: flex; align-items: center; gap: 0.5rem; opacity: 0.6;">
                <i data-lucide="shield-check" style="width:14px;height:14px"></i>
                <span>Private & Secure AI Reasoning</span>
            </div>
        </div>
    </footer>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        const btn = document.getElementById('fetch-btn');
        const resultsArea = document.getElementById('results-area');

        btn.addEventListener('click', handleFetch);

        async function handleFetch() {
            const zone = document.getElementById('zone-select').value;
            const prefs = [];
            if(document.getElementById('pref-wheelchair').checked) prefs.push("wheelchair_accessible");
            if(document.getElementById('pref-family').checked) prefs.push("family_restroom");

            // UI Loading State
            setLoading(true);
            resultsArea.innerHTML = '';

            // Stub nearby logic per backend requirement
            const stubNearbyPOIs = [
                { id: "R-101", type: "restroom", currentWaitMinutes: 14, confidenceScore: 0.9 },
                { id: "C-205", type: "concession", currentWaitMinutes: 4, confidenceScore: 0.3 },
                { id: "E-50", type: "exit", currentWaitMinutes: 2, confidenceScore: 0.95 }
            ];

            try {
                // Determine the correct base URL
                const baseUrl = window.location.origin;

                const response = await fetch(`${baseUrl}/api/recommendations`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer STUB_AUTH_TOKEN'
                    },
                    body: JSON.stringify({
                        zone: zone,
                        accessibilityPreferences: prefs,
                        nearbyPOIs: stubNearbyPOIs
                    })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                const aiResponse = JSON.parse(data.recommendation);
                renderUI(aiResponse.recommendations);
                
            } catch (err) {
                console.error("API Error", err);
                resultsArea.innerHTML = `
                    <div class="error-message" role="alert">
                        <i data-lucide="alert-circle"></i>
                        <span>AI Assistant unavailable (Error: ${err.message}). Check your connection.</span>
                    </div>
                `;
                lucide.createIcons();
            } finally {
                setLoading(false);
            }
        }

        function setLoading(isLoading) {
            const text = document.getElementById('btn-text');
            const icon = document.getElementById('btn-icon');
            
            if (isLoading) {
                btn.disabled = true;
                text.textContent = "Calculating...";
                icon.outerHTML = '<div class="loading-spinner" id="btn-icon"></div>';
            } else {
                btn.disabled = false;
                text.textContent = "Optimize My Route";
                document.getElementById('btn-icon').outerHTML = '<i data-lucide="sparkles" id="btn-icon"></i>';
                lucide.createIcons();
            }
        }

        function renderUI(recommendations) {
            resultsArea.innerHTML = '<h2 style="padding: 0 0.5rem">Top Recommendations</h2>';

            if (!recommendations || recommendations.length === 0) {
                resultsArea.innerHTML += '<p style="text-align:center;color:var(--text-muted)">No active recommendations found for this area.</p>';
                return;
            }

            recommendations.forEach((rec, idx) => {
                const card = document.createElement('div');
                card.className = 'rec-card';
                card.style.animationDelay = `${idx * 150}ms`;
                
                let warning = '';
                if (rec.uncertaintyWarning) {
                    warning = `
                        <div class="badge-warning">
                            <i data-lucide="help-circle" style="width:12px;height:12px"></i>
                            Unverified
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="rec-header">
                        <span class="poi-id">${rec.poiId}</span>
                        ${warning}
                    </div>
                    <p class="rec-text">${rec.recommendationText}</p>
                `;
                
                resultsArea.appendChild(card);
            });
            lucide.createIcons();
        }
    </script>
</body>
</html>
